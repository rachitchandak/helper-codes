<!DOCTYPE html>
<html>
<head>
  <title>Sample Page</title>
</head>
<body>
  <div class="header">
    <img src="logo.png">
    <a href="#">Click here</a>
  </div>

  <div class="nav">
    <a href="/home">Home</a>
    <a href="/about">About</a>
  </div>

  <div class="main">
    <div class="title">Welcome to Our Site</div>
    <p style="color: #999; background: #fff;">This is some low contrast text that may be hard to read.</p>

    <form>
      <input type="text" placeholder="Enter name">
      <input type="email">
      <select>
        <option value="">Choose</option>
        <option value="1">Option 1</option>
      </select>
      <button onclick="submitForm()">Submit</button>
    </form>

    <table>
      <tr>
        <td>Name</td>
        <td>Age</td>
      </tr>
      <tr>
        <td>John</td>
        <td>30</td>
      </tr>
    </table>

    <div onclick="doSomething()" style="cursor: pointer;">
      Clickable div without keyboard support
    </div>

    <video src="video.mp4" autoplay></video>
  </div>
</body>
</html>
