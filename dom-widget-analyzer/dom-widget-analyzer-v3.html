<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOM Widget Analyzer v3</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f0f13;color:#e2e2e8;min-height:100vh;font-size:13px;line-height:1.5}
textarea,code,pre{font-family:'JetBrains Mono','Fira Code',monospace}
.header{background:#0a0a0e;border-bottom:1px solid #1e1e2e;padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem}
.logo-icon{width:28px;height:28px;background:#7c6af7;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.logo h1{font-size:14px;font-weight:600;color:#e2e2e8}
.logo p{font-size:10px;color:#5a5a6a}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.tier-legend{display:flex;gap:10px;align-items:center;border-left:1px solid #1e1e2e;margin-left:6px;padding-left:12px}
.tl{display:flex;align-items:center;gap:4px;font-size:10px;color:#5a5a6a}
.tl-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.td-aria{background:#7c6af7}.td-semantic{background:#3bbc8e}.td-heuristic{background:#f0c040}.td-structural{background:#e07860}
.badge{font-size:9px;padding:2px 7px;border-radius:99px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;border:1px solid;background:#1a1a2e;color:#7c6af7;border-color:#2a2a4a}
.main{display:grid;grid-template-columns:1fr 1fr;height:calc(100vh - 58px)}
.panel-left{border-right:1px solid #1e1e2e;display:flex;flex-direction:column;background:#0a0a0e}
.panel-right{display:flex;flex-direction:column;overflow:hidden}
.panel-bar{padding:9px 14px;border-bottom:1px solid #1e1e2e;display:flex;align-items:center;gap:7px;background:#0d0d18;flex-shrink:0;flex-wrap:wrap}
.panel-label{font-size:10px;font-weight:700;color:#4a4a5a;text-transform:uppercase;letter-spacing:1px}
.btn-row{display:flex;gap:4px;flex-wrap:wrap}
button{cursor:pointer;border:none;outline:none;font:inherit}
.btn{background:#1a1a2e;color:#7a7a8a;border:1px solid #2a2a3a;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:500;transition:all .1s}
.btn:hover{background:#222238;color:#b2b2c2}
.btn-go{background:#7c6af7;color:#fff;border-color:#7c6af7;padding:5px 14px;font-size:11px;font-weight:600}
.btn-go:hover{background:#9080ff}
.btn-ghost{background:transparent;color:#4a4a5a;border:1px solid transparent;padding:3px 9px;border-radius:5px;font-size:11px}
.btn-ghost:hover{background:#1a1a2e;color:#8a8a9a;border-color:#2a2a3a}
textarea{flex:1;background:#0a0a0e;color:#b8b8c8;border:none;resize:none;padding:12px 14px;font-size:11px;line-height:1.75;outline:none;width:100%}
textarea::placeholder{color:#282838}
.panel-foot{padding:7px 14px;border-top:1px solid #1e1e2e;display:flex;align-items:center;gap:8px;background:#0d0d18}
.charcount{font-size:10px;color:#3a3a4a;margin-left:auto}
.results-scroll{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:7px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:#3a3a4a;text-align:center}
.empty-state p{font-size:12px;max-width:220px;line-height:1.5}

/* View toggle */
.view-toggle{display:flex;gap:4px}
.vt{font-size:10px;padding:3px 9px;border-radius:4px;border:1px solid #2a2a3a;background:#1a1a2e;color:#5a5a6a;cursor:pointer;font-weight:600;transition:all .1s}
.vt.on{background:#2a2048;color:#b8aaff;border-color:#4a3a8a}
.vt:hover:not(.on){color:#9a9aaa;border-color:#3a3a5a}

/* Summary cards */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.sum-card{background:#0d0d18;border:1px solid #1e1e2e;border-radius:7px;padding:9px 11px}
.sum-title{font-size:9px;font-weight:700;color:#3a3a4a;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.sum-nums{display:flex;gap:14px}
.snum{text-align:center}
.snum-n{font-size:17px;font-weight:700;line-height:1}
.snum-l{font-size:9px;color:#4a4a5a;margin-top:2px;text-transform:uppercase;letter-spacing:.3px}
.c-purple{color:#9a8aef}.c-teal{color:#3bbc8e}.c-blue{color:#4f9ef8}.c-coral{color:#f07a5a}
.c-amber{color:#c8a030}.c-green{color:#5aba6a}.c-pink{color:#d87848}.c-gray{color:#6a8aaf}

/* Tier + cat filter rows */
.filter-row{display:flex;gap:4px;flex-wrap:wrap}
.fb{font-size:10px;padding:2px 8px;border-radius:99px;border:1px solid #2a2a3a;background:#1a1a2e;color:#5a5a6a;cursor:pointer;font-weight:600;transition:all .1s}
.fb:hover{color:#9b9bab;border-color:#3a3a5a}
.fb.on{color:#fff;border-color:transparent}
.fb-all.on{background:#2a2a4a;color:#e2e2e8}
.fb-structure.on{background:#2a1d5a;color:#b8aaff}
.fb-nav.on{background:#0d2a1e;color:#5de4aa}
.fb-input.on{background:#0d1e3a;color:#78b8ff}
.fb-overlay.on{background:#2a1206;color:#f0aa78}
.tier-filter{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.tier-lbl{font-size:9px;color:#3a3a4a;text-transform:uppercase;font-weight:700;letter-spacing:.5px}
.tf{font-size:10px;padding:2px 7px;border-radius:99px;border:1px solid;cursor:pointer;font-weight:600;background:transparent}
.tf-aria{color:#7c6af7;border-color:#2a2a4a}.tf-aria.on{background:#1a1030;border-color:#4a3a8a}
.tf-semantic{color:#3bbc8e;border-color:#1a3a28}.tf-semantic.on{background:#0a2018;border-color:#2a6a48}
.tf-heuristic{color:#d0a030;border-color:#3a2e00}.tf-heuristic.on{background:#1a1800;border-color:#6a5a00}
.tf-structural{color:#d07050;border-color:#3a1e18}.tf-structural.on{background:#1a0e0a;border-color:#6a3828}

/* Section divider */
.section-divider{display:flex;align-items:center;gap:8px;padding:4px 0 2px}
.section-divider-line{flex:1;height:1px;background:#1a1a2a}
.section-divider-label{font-size:9px;font-weight:700;color:#3a3a5a;text-transform:uppercase;letter-spacing:1px;white-space:nowrap}

/* Widget cards */
.wcard{background:#0d0d18;border:1px solid #1e1e2e;border-radius:7px;overflow:hidden;transition:border-color .1s}
.wcard:hover{border-color:#252535}
.wcard[data-cat="structure"]{border-left:2px solid #4a3a8a}
.wcard[data-cat="nav"]{border-left:2px solid #1a6a4a}
.wcard[data-cat="input"]{border-left:2px solid #1a3a6a}
.wcard[data-cat="overlay"]{border-left:2px solid #6a2a12}
.card-hd{padding:8px 11px;display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.card-hd:hover{background:#101020}
.card-name{font-size:12px;font-weight:600;color:#b2b2c2;flex:1}
.cat-badge{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.cat-structure .cat-badge{background:#1a1030;color:#9a8aef;border:1px solid #2a1a5a}
.cat-nav .cat-badge{background:#0a1e14;color:#4ac88a;border:1px solid #1a4a2a}
.cat-input .cat-badge{background:#0a1428;color:#5898e8;border:1px solid #1a2a5a}
.cat-overlay .cat-badge{background:#1e0a04;color:#d87848;border:1px solid #4a1a08}
.card-count{font-size:10px;font-weight:700;padding:1px 7px;border-radius:99px;background:#1a1a2e;color:#7c6af7;border:1px solid #2a2a4a;min-width:24px;text-align:center}
.chevron{color:#2a2a3a;font-size:9px;transition:transform .12s;flex-shrink:0}
.chevron.open{transform:rotate(90deg)}
.card-bd{border-top:1px solid #121220;display:none}
.card-bd.open{display:block}

/* DOM group cards */
.gcard{background:#0d0d18;border:1px solid #1e1e2e;border-radius:7px;overflow:hidden;transition:border-color .1s}
.gcard:hover{border-color:#252535}
.gcard-hd{padding:8px 11px;display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.gcard-hd:hover{background:#101020}
.gcard-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.gcard-name{font-size:12px;font-weight:600;color:#b2b2c2;flex:1}
.gcard-count{font-size:10px;font-weight:700;padding:1px 7px;border-radius:99px;background:#1a1a2e;color:#5898e8;border:1px solid #1a2a4a;min-width:24px;text-align:center}
.gcard-bd{border-top:1px solid #121220;display:none}
.gcard-bd.open{display:block}

/* Instances */
.inst-list{max-height:300px;overflow-y:auto}
.inst{padding:6px 11px;border-bottom:1px solid #0e0e1a;display:flex;flex-direction:column;gap:3px}
.inst:last-child{border-bottom:none}
.inst:hover{background:#07070f}
.inst-row1{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.el-tag{font-size:10px;font-weight:700;background:#0d0a1e;color:#9a8aef;padding:0px 5px;border-radius:3px;font-family:monospace;border:1px solid #1e1a3e;white-space:nowrap}
.el-tag-dom{background:#091420;color:#5898e8;border:1px solid #0e2040}
.hint-text{font-size:11px;color:#5a5a6a;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.inst-row2{display:flex;gap:3px;flex-wrap:wrap}
.attr-chip{font-size:9.5px;font-family:monospace;padding:0px 5px;border-radius:2px;background:#0d0d20;color:#6b8af7;border:1px solid #1a1a30;white-space:nowrap}
.cls-chip{font-size:9.5px;padding:0px 5px;border-radius:2px;background:#0d1a0d;color:#4a9a5a;border:1px solid #1a2a1a;white-space:nowrap;font-family:monospace}
.inst-text{font-size:10px;color:#303040;font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.tier-pill{font-size:9px;padding:0px 5px;border-radius:99px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.tp-aria{background:#1a1030;color:#9a8aef;border:1px solid #3a2a7a}
.tp-semantic{background:#0a1e14;color:#3bbc8e;border:1px solid #1a4a2a}
.tp-heuristic{background:#1a1800;color:#c8a030;border:1px solid #3a2e00}
.tp-structural{background:#180a06;color:#c06848;border:1px solid #3a1a10}
.issue-warn{font-size:9px;padding:0px 5px;border-radius:3px;background:#1a1000;color:#c8a030;border:1px solid #3a2a00;white-space:nowrap}
.issue-info{font-size:9px;padding:0px 5px;border-radius:3px;background:#001224;color:#4f9ef8;border:1px solid #00244a;white-space:nowrap}
.show-more{padding:5px;font-size:10px;color:#4f9ef8;cursor:pointer;text-align:center;border-top:1px solid #0e0e1a}
.show-more:hover{background:#07070f;color:#7cbdff}
.no-results{text-align:center;padding:20px;font-size:11px;color:#3a3a4a}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#0a0a0e}
::-webkit-scrollbar-thumb{background:#242434;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#343444}
</style>
</head>
<body>

<div class="header">
  <div class="logo-icon">⬡</div>
  <div class="logo">
    <h1>DOM Widget Analyzer <span style="font-size:10px;color:#3a3a4a;font-weight:400">v3</span></h1>
    <p>Widget extraction → remaining DOM nodes · zero duplication</p>
  </div>
  <div class="tier-legend">
    <div class="tl"><div class="tl-dot td-aria"></div>ARIA</div>
    <div class="tl"><div class="tl-dot td-semantic"></div>Semantic</div>
    <div class="tl"><div class="tl-dot td-heuristic"></div>Class/Attr</div>
    <div class="tl"><div class="tl-dot td-structural"></div>Structural</div>
  </div>
  <div class="header-right"><span class="badge">30 widget patterns</span></div>
</div>

<div class="main">
  <div class="panel-left">
    <div class="panel-bar">
      <span class="panel-label">HTML Input</span>
      <div class="btn-row">
        <button class="btn" onclick="loadSample('aria')">ARIA sample</button>
        <button class="btn" onclick="loadSample('noaria')">No-ARIA sample</button>
        <button class="btn btn-ghost" onclick="clearAll()">Clear</button>
      </div>
    </div>
    <textarea id="hi" spellcheck="false" oninput="updateCount()"
placeholder="Paste any HTML here — with or without ARIA.

Pass 1 → Widget extraction (30 ARIA patterns)
  Detected via role=, aria-*, class names, DOM structure

Pass 2 → Remaining DOM nodes (every unclaimed element)
  Grouped by: Form Controls · Landmark Regions
  Document Structure · Data Presentation
  Live Regions · Multimedia · Text & Inline
  Interactive · Generic Containers · Special

No element appears twice. ⌘↵ to analyze."></textarea>
    <div class="panel-foot">
      <button class="btn-go" onclick="run()">Analyze DOM →</button>
      <span style="font-size:10px;color:#2a2a3a">⌘↵</span>
      <span class="charcount" id="cc">0 chars</span>
    </div>
  </div>

  <div class="panel-right">
    <div class="panel-bar" id="results-bar" style="display:none">
      <span class="panel-label">Results</span>
      <div class="view-toggle">
        <button class="vt on" id="vt-all"      onclick="setView('all',this)">All</button>
        <button class="vt"    id="vt-widgets"  onclick="setView('widgets',this)">Widgets</button>
        <button class="vt"    id="vt-dom"      onclick="setView('dom',this)">DOM Nodes</button>
      </div>
      <span id="rsummary" style="font-size:10px;color:#3a3a4a;margin-left:auto"></span>
    </div>
    <div class="results-scroll" id="rs">
      <div class="empty-state" id="es">
        <div style="font-size:28px;opacity:.3">⬡</div>
        <p>Paste HTML and run — or load a sample to see extraction in action</p>
      </div>
      <div id="rc" style="display:none"></div>
    </div>
  </div>
</div>

<script>
const T = { ARIA:'aria', SEM:'semantic', HEUR:'heuristic', STRUCT:'structural' };
const TIER_LABEL = { aria:'ARIA', semantic:'Semantic', heuristic:'Class/Attr', structural:'Structural' };
const CATS = { structure:'Structure', nav:'Navigation', input:'Input', overlay:'Overlay' };
const SKIP_TAGS = new Set(['html','head','body','meta','script','style','link','title','base','noscript','template','br','wbr']);

// ─── PASS 1: Widget definitions ──────────────────────────────────────────────
const WIDGETS = [
{id:'accordion',name:'Accordion',cat:'structure',rules:[
  {sel:'details',tier:T.SEM,hint:'Native <details> element'},
  {sel:'button[aria-expanded][aria-controls]',tier:T.ARIA,hint:'ARIA accordion trigger'},
  {sel:'[role="region"][aria-labelledby]',tier:T.ARIA,hint:'ARIA accordion panel'},
  {sel:'[class*="accordion"]',tier:T.HEUR,hint:'Accordion class'},
  {sel:'[data-bs-toggle="collapse"]',tier:T.HEUR,hint:'Bootstrap 5 collapse'},
  {sel:'[data-toggle="collapse"]',tier:T.HEUR,hint:'Bootstrap 4 collapse'},
  {sel:'[class*="collapse"]:not(table)',tier:T.HEUR,hint:'Collapse class'},
]},
{id:'alert',name:'Alert / Banner',cat:'overlay',rules:[
  {sel:'[role="alert"]',tier:T.ARIA,hint:'ARIA alert (assertive)'},
  {sel:'[role="status"]',tier:T.ARIA,hint:'ARIA status (polite)'},
  {sel:'[aria-live="assertive"]',tier:T.ARIA,hint:'Assertive live region'},
  {sel:'[aria-live="polite"]',tier:T.ARIA,hint:'Polite live region'},
  {sel:'[class*="alert"]:not(script)',tier:T.HEUR,hint:'Alert class'},
  {sel:'[class*="toast"]',tier:T.HEUR,hint:'Toast notification'},
  {sel:'[class*="snackbar"]',tier:T.HEUR,hint:'Snackbar (Material)'},
  {sel:'[class*="notification"]',tier:T.HEUR,hint:'Notification class'},
  {sel:'[class*="banner"]:not(header)',tier:T.HEUR,hint:'Banner class'},
]},
{id:'alertdialog',name:'Alert dialog',cat:'overlay',rules:[
  {sel:'[role="alertdialog"]',tier:T.ARIA,hint:'ARIA alertdialog'},
  {sel:'[class*="confirm"][class*="modal"]',tier:T.HEUR,hint:'Confirm modal'},
]},
{id:'breadcrumb',name:'Breadcrumb',cat:'nav',rules:[
  {sel:'[aria-label*="breadcrumb" i]',tier:T.ARIA,hint:'Breadcrumb via aria-label'},
  {sel:'[aria-label*="you are here" i]',tier:T.ARIA,hint:'Breadcrumb location'},
  {sel:'[class*="breadcrumb"]',tier:T.HEUR,hint:'Breadcrumb class'},
  {sel:'[itemtype*="BreadcrumbList"]',tier:T.HEUR,hint:'Schema.org BreadcrumbList'},
  {sel:'nav ol a ~ a',tier:T.STRUCT,hint:'Nav ordered list pattern'},
]},
{id:'button',name:'Button',cat:'input',rules:[
  {sel:'button',tier:T.SEM,hint:'Native <button>'},
  {sel:'[role="button"]',tier:T.ARIA,hint:'ARIA button role'},
  {sel:'input[type="button"]',tier:T.SEM,hint:'Input[type=button]'},
  {sel:'input[type="submit"]',tier:T.SEM,hint:'Submit button'},
  {sel:'input[type="reset"]',tier:T.SEM,hint:'Reset button'},
  {sel:'a[class*="btn"]:not([role])',tier:T.HEUR,hint:'Anchor styled as button'},
  {sel:'[class*="button"]:not(button):not([role])',tier:T.HEUR,hint:'Non-button with button class'},
]},
{id:'carousel',name:'Carousel',cat:'structure',rules:[
  {sel:'[aria-roledescription*="carousel" i]',tier:T.ARIA,hint:'ARIA carousel'},
  {sel:'[class*="carousel"]',tier:T.HEUR,hint:'Carousel class'},
  {sel:'[class*="swiper"]',tier:T.HEUR,hint:'Swiper.js'},
  {sel:'.slick-slider',tier:T.HEUR,hint:'Slick slider'},
  {sel:'[data-bs-ride="carousel"]',tier:T.HEUR,hint:'Bootstrap 5 carousel'},
  {sel:'[data-ride="carousel"]',tier:T.HEUR,hint:'Bootstrap 4 carousel'},
]},
{id:'checkbox',name:'Checkbox',cat:'input',rules:[
  {sel:'input[type="checkbox"]',tier:T.SEM,hint:'Native checkbox'},
  {sel:'[role="checkbox"]',tier:T.ARIA,hint:'ARIA checkbox'},
]},
{id:'combobox',name:'Combobox',cat:'input',rules:[
  {sel:'[role="combobox"]',tier:T.ARIA,hint:'ARIA combobox'},
  {sel:'input[list]',tier:T.SEM,hint:'Native datalist combobox'},
  {sel:'input[aria-autocomplete]',tier:T.ARIA,hint:'Autocomplete input'},
  {sel:'[class*="autocomplete"]',tier:T.HEUR,hint:'Autocomplete class'},
  {sel:'[class*="typeahead"]',tier:T.HEUR,hint:'Typeahead class'},
  {sel:'[class*="autosuggest"]',tier:T.HEUR,hint:'Autosuggest class'},
]},
{id:'dialog',name:'Dialog (modal)',cat:'overlay',rules:[
  {sel:'dialog',tier:T.SEM,hint:'Native <dialog>'},
  {sel:'[role="dialog"]',tier:T.ARIA,hint:'ARIA dialog'},
  {sel:'[aria-modal="true"]',tier:T.ARIA,hint:'aria-modal attribute'},
  {sel:'[class*="modal"]:not([class*="modal-item"]):not([class*="modal-content"])',tier:T.HEUR,hint:'Modal class'},
  {sel:'[class*="lightbox"]',tier:T.HEUR,hint:'Lightbox class'},
  {sel:'[class*="dialog"]:not(dialog)',tier:T.HEUR,hint:'Dialog class'},
]},
{id:'disclosure',name:'Disclosure',cat:'structure',rules:[
  {sel:'summary',tier:T.SEM,hint:'Native <summary> trigger'},
  {sel:'button[aria-expanded]:not([aria-controls])',tier:T.ARIA,hint:'Disclosure trigger'},
  {sel:'[aria-expanded][aria-pressed]',tier:T.ARIA,hint:'Toggle button'},
  {sel:'[class*="show-hide"]',tier:T.HEUR,hint:'Show/hide class'},
]},
{id:'feed',name:'Feed',cat:'structure',rules:[
  {sel:'[role="feed"]',tier:T.ARIA,hint:'ARIA feed'},
  {sel:'[role="article"]',tier:T.ARIA,hint:'ARIA article'},
  {sel:'article',tier:T.SEM,hint:'Native <article>'},
  {sel:'[class*="feed"]',tier:T.HEUR,hint:'Feed class'},
  {sel:'[class*="timeline"]',tier:T.HEUR,hint:'Timeline class'},
]},
{id:'grid',name:'Grid',cat:'structure',rules:[
  {sel:'[role="grid"]',tier:T.ARIA,hint:'ARIA grid'},
  {sel:'[role="gridcell"]',tier:T.ARIA,hint:'ARIA gridcell'},
  {sel:'[role="columnheader"]',tier:T.ARIA,hint:'Column header'},
  {sel:'[role="rowheader"]',tier:T.ARIA,hint:'Row header'},
  {sel:'[class*="ag-grid"]',tier:T.HEUR,hint:'AG Grid'},
  {sel:'[class*="datagrid"]',tier:T.HEUR,hint:'DataGrid class'},
]},
{id:'landmark',name:'Landmark',cat:'structure',rules:[
  {sel:'header',tier:T.SEM,hint:'<header> landmark'},
  {sel:'nav',tier:T.SEM,hint:'<nav> landmark'},
  {sel:'main',tier:T.SEM,hint:'<main> landmark'},
  {sel:'aside',tier:T.SEM,hint:'<aside> landmark'},
  {sel:'footer',tier:T.SEM,hint:'<footer> landmark'},
  {sel:'[role="banner"]',tier:T.ARIA,hint:'Banner landmark'},
  {sel:'[role="navigation"]',tier:T.ARIA,hint:'Nav landmark'},
  {sel:'[role="main"]',tier:T.ARIA,hint:'Main landmark'},
  {sel:'[role="complementary"]',tier:T.ARIA,hint:'Complementary landmark'},
  {sel:'[role="contentinfo"]',tier:T.ARIA,hint:'Content info landmark'},
  {sel:'[role="search"]',tier:T.ARIA,hint:'Search landmark'},
  {sel:'section[aria-label],section[aria-labelledby]',tier:T.ARIA,hint:'Named section landmark'},
]},
{id:'link',name:'Link',cat:'nav',rules:[
  {sel:'a[href]',tier:T.SEM,hint:'Native anchor link'},
  {sel:'[role="link"]',tier:T.ARIA,hint:'ARIA link'},

// ─── Structural heuristic detectors ──────────────────────────────────────────
function structuralDetectors(doc) {
  const extra = [];
  // Nested list → tree view
  const nestedRoots = new Set();
  doc.querySelectorAll('ul > li > ul, ul > li > ol, ol > li > ul, ol > li > ol').forEach(inner => {
    const root = inner.closest('ul, ol');
    if (root && !root.closest('[role="tree"]') && !root.closest('[class*="tree"]')) nestedRoots.add(root);
  });
  if (nestedRoots.size) extra.push({widgetId:'treeview', instances:[...nestedRoots].map(el => ({
    el, tier:T.STRUCT, hint:'Nested list (ul>li>ul) — tree view pattern', selector:'ul>li>ul', issues:[]
  }))});
  // nav > ul → menu
  const navLists = [...doc.querySelectorAll('nav > ul, nav > ol')].filter(ul =>
    !ul.closest('[aria-label*="breadcrumb" i]') && !ul.closest('[class*="breadcrumb"]'));
  if (navLists.length) extra.push({widgetId:'menu', instances:navLists.map(el => ({
    el, tier:T.STRUCT, hint:'Nav list (nav>ul) — navigation menu', selector:'nav>ul', issues:[]
  }))});
  // button + sibling div → disclosure
  const discPairs = [];
  doc.querySelectorAll('button + div, button + section').forEach(sib => {
    const btn = sib.previousElementSibling;
    if (btn && !btn.hasAttribute('aria-expanded') && !btn.hasAttribute('aria-haspopup'))
      discPairs.push({el:btn, tier:T.STRUCT, hint:'button + div/section sibling — disclosure pattern', selector:'button+div', issues:[]});
  });
  if (discPairs.length) extra.push({widgetId:'disclosure', instances:discPairs});
  // dl → accordion candidate
  const dls = [...doc.querySelectorAll('dl')];
  if (dls.length) extra.push({widgetId:'accordion', instances:dls.map(el => ({
    el, tier:T.STRUCT, hint:'<dl> (description list) — FAQ/accordion pattern', selector:'dl', issues:[]
  }))});
  // div > repeated card divs → feed
  const cardLists = [];
  doc.querySelectorAll('div, section, ul').forEach(parent => {
    const ch = [...parent.children];
    if (ch.length < 2 || ch.length > 20) return;
    const ok = ch.every(c =>
      (c.tagName==='DIV'||c.tagName==='LI'||c.tagName==='ARTICLE') &&
      c.querySelector('img,picture') && c.querySelector('p,span,h2,h3,h4'));
    if (ok && !parent.closest('[role]') && !parent.closest('[class*="carousel"]'))
      cardLists.push({el:parent, tier:T.STRUCT, hint:`${parent.tagName.toLowerCase()} with ${ch.length} card-like children — feed/card list`, selector:'div>div(img+text)', issues:[]});
  });
  if (cardLists.length) extra.push({widgetId:'feed', instances:cardLists});
  // div[id] targeted by a[href=#id] → tab panels
  const linkedIds = new Set();
  doc.querySelectorAll('a[href^="#"],[data-bs-target]').forEach(t => {
    const ref = (t.getAttribute('href')||t.getAttribute('data-bs-target')||'').replace('#','');
    if (ref) linkedIds.add(ref);
  });
  const panelCandidates = [...doc.querySelectorAll('div[id],section[id]')]
    .filter(el => linkedIds.has(el.id) && !el.getAttribute('role'));
  if (panelCandidates.length >= 2) extra.push({widgetId:'tabs', instances:panelCandidates.map(el => ({
    el, tier:T.STRUCT, hint:`#${el.id} targeted by anchor — possible tab panel`, selector:'div[id] ← a[href=#id]', issues:[]
  }))});
  // label > checkbox + span → switch
  doc.querySelectorAll('label:not([class*="switch"]):not([class*="toggle"]) input[type="checkbox"]').forEach(inp => {
    const lbl = inp.closest('label');
    if (lbl && lbl.querySelectorAll('span').length >= 1 && !lbl.querySelector('[class*="checkbox"]'))
      extra.push({widgetId:'switch', instances:[{el:lbl, tier:T.STRUCT,
        hint:'label > checkbox + span — possible switch', selector:'label>input+span', issues:[]}]});
  });
  return extra;
}

// ─── Multi-thumb slider detector ─────────────────────────────────────────────
function detectMultiThumb(doc) {
  const instances = [];
  // ARIA-based: multiple [role="slider"] in same parent
  const ariaMap = new Map();
  doc.querySelectorAll('[role="slider"]').forEach(s => {
    const p = s.parentElement; if (!p) return;
    ariaMap.set(p, (ariaMap.get(p)||0)+1);
  });
  ariaMap.forEach((count, parent) => {
    if (count >= 2) instances.push({el:parent, tier:T.ARIA, issues:[],
      hint:`${count} ARIA sliders in same parent — multi-thumb`, selector:`[role=slider]×${count}`});
  });
  // Heuristic: 2+ range inputs in same parent
  const rangeMap = new Map();
  doc.querySelectorAll('input[type="range"]').forEach(r => {
    const p = r.parentElement; if (!p) return;
    rangeMap.set(p, (rangeMap.get(p)||0)+1);
  });
  rangeMap.forEach((count, parent) => {
    if (count >= 2) instances.push({el:parent, tier:T.HEUR, issues:[],
      hint:`${count} range inputs in same parent — multi-thumb slider`, selector:`input[range]×${count}`});
  });
  return instances;
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
const ATTR_KEEP = new Set([
  'role','aria-label','aria-labelledby','aria-describedby','aria-expanded','aria-haspopup',
  'aria-controls','aria-selected','aria-checked','aria-pressed','aria-modal','aria-orientation',
  'aria-valuenow','aria-valuemin','aria-valuemax','aria-valuetext','aria-autocomplete',
  'aria-roledescription','aria-current','aria-live','aria-atomic','aria-posinset','aria-setsize',
  'aria-level','aria-rowspan','aria-colspan','aria-sort','aria-colindex','aria-rowindex',
  'aria-rowcount','aria-colcount','aria-multiselectable','aria-details','aria-owns',
  'aria-disabled','aria-hidden','aria-required','aria-invalid','aria-errormessage',
  'aria-flowto','type','tabindex','for','alt','autocomplete','name','href','value',
  'data-toggle','data-bs-toggle','data-bs-ride','data-tooltip','data-tippy-content',
  'data-tab','draggable','lang','title'
]);
function getAttrs(el) {
  try {
    return [...el.attributes].filter(a => ATTR_KEEP.has(a.name)).map(a => `${a.name}="${a.value}"`);
  } catch(e) { return []; }
}
function getClasses(el) {
  try {
    const c = el.className;
    return (c && typeof c === 'string') ? c.split(/\s+/).filter(x => x.length > 0 && x.length < 50) : [];
  } catch(e) { return []; }
}
function getPreview(el) {
  try {
    const t = (el.textContent||'').replace(/\s+/g,' ').trim();
    return t.length > 65 ? t.slice(0,65)+'…' : t;
  } catch(e) { return ''; }
}
function issueCheck(widgetId, el) {
  const issues = [];
  const tag = el.tagName ? el.tagName.toLowerCase() : '';
  const missingName = !el.getAttribute('aria-label') && !el.getAttribute('aria-labelledby') &&
    !(el.textContent||'').trim() && !el.getAttribute('title') && !el.getAttribute('alt');
  if (missingName && ['dialog','alertdialog','grid','listbox','menu','toolbar','tree','tablist'].includes(widgetId))
    issues.push({type:'warn',msg:'No accessible name'});
  if (widgetId==='button' && el.getAttribute('role')==='button' && tag!=='button' && !el.hasAttribute('tabindex'))
    issues.push({type:'warn',msg:'role=button missing tabindex'});
  if (widgetId==='dialog' && !el.getAttribute('aria-labelledby') && !el.getAttribute('aria-label'))
    issues.push({type:'warn',msg:'Dialog needs accessible label'});
  if (widgetId==='link' && tag==='a' && !el.getAttribute('href'))
    issues.push({type:'warn',msg:'Anchor missing href'});
  if (widgetId==='link') {
    const t = (el.textContent||'').trim().toLowerCase();
    if (['click here','read more','more','here','link'].includes(t))
      issues.push({type:'warn',msg:'Non-descriptive link text'});
  }
  if (widgetId==='slider' && !el.hasAttribute('aria-valuenow') && tag!=='input')
    issues.push({type:'warn',msg:'Missing aria-valuenow'});
  if (widgetId==='checkbox' && !el.id && tag==='input')
    issues.push({type:'info',msg:'No associated label (needs id+for)'});
  return issues;
}
function runRules(doc, widget, claimed) {
  const seen = new Set();
  const results = [];
  for (const rule of widget.rules) {
    let els;
    try { els = [...doc.querySelectorAll(rule.sel)]; } catch(e) { continue; }
    for (const el of els) {
      if (claimed.has(el) || seen.has(el) || SKIP_TAGS.has((el.tagName||'').toLowerCase())) continue;
      seen.add(el);
      claimed.add(el);
      results.push({el, tier:rule.tier, hint:rule.hint, selector:rule.sel, issues:issueCheck(widget.id, el)});
    }
  }
  return results;
}

// ─── Main analysis ────────────────────────────────────────────────────────────
function analyzeAll(doc) {
  const claimed = new Set();

  // PASS 1: Widgets
  const structExtras = structuralDetectors(doc);
  const extraMap = {};
  structExtras.forEach(({widgetId, instances}) => {
    if (!extraMap[widgetId]) extraMap[widgetId] = [];
    extraMap[widgetId].push(...instances);
  });
  const foundWidgets = [];
  for (const w of WIDGETS) {
    let instances = [];
    if (w.custom) {
      if (w.id === 'multislider') instances = detectMultiThumb(doc);
    } else {
      instances = runRules(doc, w, claimed);
    }
    // Claim custom instances
    instances.forEach(i => { if (i.el) claimed.add(i.el); });
    // Merge structural extras (dedup)
    if (extraMap[w.id]) {
      extraMap[w.id].forEach(i => {
        if (i.el && !claimed.has(i.el)) {
          claimed.add(i.el);
          instances.push({...i, issues: i.issues||[]});
        }
      });
    }
    if (instances.length) foundWidgets.push({widget:w, instances});
  }

  // PASS 2: DOM element groups
  const foundGroups = [];
  for (const group of DOM_GROUPS) {
    const groupSeen = new Set();
    const instances = [];
    for (const item of group.items) {
      let els;
      try { els = [...doc.querySelectorAll(item.sel)]; } catch(e) { continue; }
      for (const el of els) {
        const tag = (el.tagName||'').toLowerCase();
        if (claimed.has(el) || groupSeen.has(el)) continue;
        if (tag === 'html' || tag === 'head' || tag === 'body') continue;
        claimed.add(el);
        groupSeen.add(el);
        instances.push({el, hint:item.hint, selector:item.sel, issues:[]});
      }
    }
    if (instances.length) foundGroups.push({group, instances});
  }

  return {foundWidgets, foundGroups};
}

// ─── State ────────────────────────────────────────────────────────────────────
let _state = null;
let _view = 'all';          // 'all' | 'widgets' | 'dom'
let _activeCat = 'all';
let _activeTiers = new Set(['aria','semantic','heuristic','structural']);
let _activeGroup = 'all';

function run() {
  const html = document.getElementById('hi').value.trim();
  if (!html) { alert('Paste HTML first.'); return; }
  const doc = new DOMParser().parseFromString(html, 'text/html');
  _state = analyzeAll(doc);
  _activeCat = 'all'; _activeGroup = 'all';
  renderResults();
}

// ─── Rendering ────────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderResults() {
  if (!_state) return;
  const {foundWidgets, foundGroups} = _state;
  document.getElementById('es').style.display = 'none';
  document.getElementById('results-bar').style.display = 'flex';
  const rc = document.getElementById('rc');
  rc.style.display = 'block';

  const totalW = foundWidgets.reduce((a,b)=>a+b.instances.filter(i=>_activeTiers.has(i.tier)).length, 0);
  const totalD = foundGroups.reduce((a,b)=>a+b.instances.length, 0);
  const totalAll = totalW + totalD;
  document.getElementById('rsummary').textContent = `${totalAll} nodes total`;

  // Cat counts for widgets
  const catCount = {structure:0,nav:0,input:0,overlay:0};
  foundWidgets.forEach(({widget,instances}) => {
    catCount[widget.cat] = (catCount[widget.cat]||0) + instances.filter(i=>_activeTiers.has(i.tier)).length;
  });
  const tierCount = {aria:0,semantic:0,heuristic:0,structural:0};
  foundWidgets.forEach(({instances}) => {
    instances.forEach(i => { if(_activeTiers.has(i.tier)) tierCount[i.tier]=(tierCount[i.tier]||0)+1; });
  });

  let html = `
  <div class="summary-grid">
    <div class="sum-card">
      <div class="sum-title">Widgets detected</div>
      <div class="sum-nums">
        <div class="snum"><div class="snum-n c-purple">${foundWidgets.length}</div><div class="snum-l">Types</div></div>
        <div class="snum"><div class="snum-n c-blue">${totalW}</div><div class="snum-l">Instances</div></div>
        <div class="snum"><div class="snum-n c-teal">${foundWidgets.reduce((a,b)=>a+b.instances.filter(i=>i.issues&&i.issues.length).length,0)}</div><div class="snum-l">Issues</div></div>
      </div>
    </div>
    <div class="sum-card">
      <div class="sum-title">DOM nodes (unclaimed)</div>
      <div class="sum-nums">
        <div class="snum"><div class="snum-n c-amber">${foundGroups.length}</div><div class="snum-l">Groups</div></div>
        <div class="snum"><div class="snum-n c-pink">${totalD}</div><div class="snum-l">Elements</div></div>
      </div>
    </div>
  </div>`;

  // Widget section
  if (_view === 'all' || _view === 'widgets') {
    const visibleWidgets = foundWidgets.filter(({widget,instances}) => {
      if (_activeCat !== 'all' && widget.cat !== _activeCat) return false;
      return instances.filter(i=>_activeTiers.has(i.tier)).length > 0;
    });
    html += `
    <div class="section-divider">
      <div class="section-divider-line"></div>
      <div class="section-divider-label">⬡ Widgets — ${totalW} instances / ${foundWidgets.length} types</div>
      <div class="section-divider-line"></div>
    </div>
    <div class="filter-row">
      <button class="fb fb-all ${_activeCat==='all'?'on':''}" onclick="setCat('all')">All (${foundWidgets.reduce((a,b)=>a+b.instances.length,0)})</button>
      <button class="fb fb-structure ${_activeCat==='structure'?'on':''}" onclick="setCat('structure')">Structure (${catCount.structure})</button>
      <button class="fb fb-nav ${_activeCat==='nav'?'on':''}" onclick="setCat('nav')">Nav (${catCount.nav})</button>
      <button class="fb fb-input ${_activeCat==='input'?'on':''}" onclick="setCat('input')">Input (${catCount.input})</button>
      <button class="fb fb-overlay ${_activeCat==='overlay'?'on':''}" onclick="setCat('overlay')">Overlay (${catCount.overlay})</button>
    </div>
    <div class="tier-filter">
      <span class="tier-lbl">Tier:</span>
      <button class="tf tf-aria ${_activeTiers.has('aria')?'on':''}" onclick="toggleTier('aria')">ARIA (${tierCount.aria||0})</button>
      <button class="tf tf-semantic ${_activeTiers.has('semantic')?'on':''}" onclick="toggleTier('semantic')">Semantic (${tierCount.semantic||0})</button>
      <button class="tf tf-heuristic ${_activeTiers.has('heuristic')?'on':''}" onclick="toggleTier('heuristic')">Class/Attr (${tierCount.heuristic||0})</button>
      <button class="tf tf-structural ${_activeTiers.has('structural')?'on':''}" onclick="toggleTier('structural')">Structural (${tierCount.structural||0})</button>
    </div>`;
    if (visibleWidgets.length === 0) {
      html += `<div class="no-results">No widgets matched current filters.</div>`;
    } else {
      for (const {widget,instances} of visibleWidgets) {
        const fi = instances.filter(i=>_activeTiers.has(i.tier));
        if (fi.length) html += buildWidgetCard(widget, fi);
      }
    }
  }

  // DOM nodes section
  if (_view === 'all' || _view === 'dom') {
    const visibleGroups = foundGroups.filter(({group}) =>
      _activeGroup === 'all' || group.id === _activeGroup);
    html += `
    <div class="section-divider" style="margin-top:8px">
      <div class="section-divider-line"></div>
      <div class="section-divider-label">◈ DOM Nodes — ${totalD} unclaimed elements / ${foundGroups.length} groups</div>
      <div class="section-divider-line"></div>
    </div>
    <div class="filter-row">
      <button class="fb fb-all ${_activeGroup==='all'?'on':''}" onclick="setGroup('all')">All groups (${totalD})</button>
      ${foundGroups.map(({group,instances})=>`<button class="fb ${_activeGroup===group.id?'on':''}" style="${_activeGroup===group.id?`background:${group.color}22;color:${group.color};border-color:${group.color}66`:''}" onclick="setGroup('${group.id}')">${group.name} (${instances.length})</button>`).join('')}
    </div>`;
    if (visibleGroups.length === 0) {
      html += `<div class="no-results">No DOM nodes matched current group filter.</div>`;
    } else {
      for (const {group,instances} of visibleGroups) {
        html += buildGroupCard(group, instances);
      }
    }
  }

  rc.innerHTML = html;
}

function buildInstHTML(instances, isWidget) {
  const MAX = 5;
  let html = '';
  instances.forEach((inst, i) => {
    const hidden = i >= MAX ? 'style="display:none"' : '';
    const el = inst.el;
    const tag = (el.tagName||'?').toLowerCase();
    const attrs = getAttrs(el);
    const classes = getClasses(el).slice(0,5);
    const preview = getPreview(el);
    const attrsHTML = attrs.map(a=>`<span class="attr-chip">${esc(a)}</span>`).join('');
    const classHTML = classes.map(c=>`<span class="cls-chip">.${esc(c)}</span>`).join('');
    const issHTML = (inst.issues||[]).map(iss=>`<span class="issue-${iss.type}">${esc(iss.msg)}</span>`).join('');
    const tierHTML = inst.tier ? `<span class="tier-pill tp-${inst.tier}">${TIER_LABEL[inst.tier]||inst.tier}</span>` : '';
    html += `<div class="inst" ${hidden}>
      <div class="inst-row1">
        <span class="el-tag ${isWidget?'':'el-tag-dom'}">&lt;${esc(tag)}&gt;</span>
        ${tierHTML}
        <span class="hint-text">${esc(inst.hint)}</span>
        ${issHTML}
      </div>
      ${(attrsHTML||classHTML)?`<div class="inst-row2">${attrsHTML}${classHTML}</div>`:''}
      ${preview?`<div class="inst-text">"${esc(preview)}"</div>`:''}
    </div>`;
  });
  const extra = instances.length - MAX;
  const moreHTML = extra > 0 ? `<div class="show-more" onclick="showMore(this,${MAX})">▾ ${extra} more</div>` : '';
  return `<div class="inst-list">${html}</div>${moreHTML}`;
}

function buildWidgetCard(widget, instances) {
  const catClass = `cat-${widget.cat}`;
  return `<div class="wcard ${catClass}" data-cat="${widget.cat}">
    <div class="card-hd" onclick="toggleCard(this)">
      <span class="card-name">${widget.name}</span>
      <span class="cat-badge">${CATS[widget.cat]}</span>
      <span class="card-count">${instances.length}</span>
      <span class="chevron">▶</span>
    </div>
    <div class="card-bd">${buildInstHTML(instances, true)}</div>
  </div>`;
}

function buildGroupCard(group, instances) {
  return `<div class="gcard">
    <div class="gcard-hd" onclick="toggleCard(this)">
      <span class="gcard-dot" style="background:${group.color}"></span>
      <span class="gcard-name">${group.name}</span>
      <span class="gcard-count" style="color:${group.color};border-color:${group.color}44">${instances.length}</span>
      <span class="chevron">▶</span>
    </div>
    <div class="gcard-bd" style="border-top:1px solid #121220;display:none">${buildInstHTML(instances, false)}</div>
  </div>`;
}

function toggleCard(hd) {
  const bd = hd.nextElementSibling;
  const ch = hd.querySelector('.chevron');
  const isOpen = bd.style.display !== 'block';
  bd.style.display = isOpen ? 'block' : 'none';
  if (ch) ch.classList.toggle('open', isOpen);
}
function showMore(btn) {
  btn.previousElementSibling.querySelectorAll('.inst').forEach(el=>el.style.display='');
  btn.remove();
}
function setView(v, btn) {
  _view = v;
  document.querySelectorAll('.vt').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderResults();
}
function setCat(cat) { _activeCat = cat; renderResults(); }
function setGroup(gid) { _activeGroup = gid; renderResults(); }
function toggleTier(tier) {
  if (_activeTiers.has(tier)) { if (_activeTiers.size > 1) _activeTiers.delete(tier); }
  else _activeTiers.add(tier);
  renderResults();
}
function updateCount() {
  const v = document.getElementById('hi').value;
  document.getElementById('cc').textContent = v.length.toLocaleString() + ' chars';
}
function clearAll() {
  document.getElementById('hi').value = '';
  document.getElementById('cc').textContent = '0 chars';
  document.getElementById('es').style.display = '';
  document.getElementById('rc').style.display = 'none';
  document.getElementById('rc').innerHTML = '';
  document.getElementById('results-bar').style.display = 'none';
  document.getElementById('rsummary').textContent = '';
  _state = null;
}
